<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>SoundWave</title>

<!-- Preconnect to font CDN to reduce DNS + TLS handshake latency -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<!--
  Load only the weights actually used in the UI:
  Syne 700+800 (logo, titles), DM Sans 400+500 (body/controls).
  font-display=swap prevents invisible text during load.
-->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Preload critical stylesheet so it arrives before first paint -->
<link rel="preload" href="/static/style.css" as="style"/>
<link rel="stylesheet" href="/static/style.css"/>

<style>
/* ── Auth UI additions (inline — avoids extra request) ── */

/* User chip shown in topbar when logged in */
.user-chip{
  display:flex;align-items:center;gap:8px;
  padding:5px 12px 5px 6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:50px;cursor:default;flex-shrink:0;
  transition:border-color var(--tr);
}
.user-chip:hover{border-color:var(--border2)}

.user-avatar{
  width:26px;height:26px;border-radius:50%;
  background:rgba(110,231,183,.15);border:1px solid rgba(110,231,183,.25);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;
  color:var(--accent);flex-shrink:0;text-transform:uppercase;
}
.user-name{
  font-size:.8rem;font-weight:500;color:var(--text2);
  max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.logout-btn{
  background:none;border:1px solid var(--border);color:var(--text3);
  cursor:pointer;padding:6px 11px;border-radius:50px;
  font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  transition:all var(--tr);
}
.logout-btn svg{width:14px;height:14px}
.logout-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface)}

.login-link{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:50px;
  background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2);
  color:var(--accent);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;
  text-decoration:none;flex-shrink:0;transition:all var(--tr);
}
.login-link:hover{background:rgba(110,231,183,.18);border-color:rgba(110,231,183,.35)}

/* Hidden before auth-init.js resolves the login state */
#authArea{display:none}
</style>
</head>
<body>
  <div class="ambient" id="ambient"></div>
  <div class="noise"></div>

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="14" stroke="var(--accent)" stroke-width="2"/>
            <path d="M10 20 Q16 8 22 20" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <circle cx="16" cy="16" r="3" fill="var(--accent)"/>
          </svg>
        </div>
        <span class="logo-text">SoundWave</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Close sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button class="nav-item" data-view="library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Library
      </button>
      <button class="nav-item" data-view="liked">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        Liked Songs
      </button>
    </nav>

    <div class="sidebar-queue">
      <div class="queue-title">Up Next</div>
      <div class="queue-list" id="queueList"></div>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <!-- ── MAIN ────────────────────────────────────────────────────────── -->
  <main class="main" id="main">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search songs, artists…" autocomplete="off" spellcheck="false"/>
        <button class="search-clear" id="searchClear" aria-label="Clear search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- ── AUTH AREA ──────────────────────────────────────────────── -->
      <div id="authArea">
        <!-- Logged-in state -->
        <div id="authLoggedIn" style="display:none;align-items:center;gap:8px">
          <div class="user-chip">
            <div class="user-avatar" id="userAvatar">?</div>
            <span class="user-name" id="userName"></span>
          </div>
          <button class="logout-btn" id="logoutBtn" title="Sign out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sign out
          </button>
        </div>
        <!-- Logged-out state -->
        <div id="authLoggedOut" style="display:none">
          <a class="login-link" href="/login">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Sign in
          </a>
        </div>
      </div>
      <!-- ── END AUTH AREA ──────────────────────────────────────────── -->
    </header>

    <div class="content" id="content">

      <!-- HOME VIEW -->
      <div class="view" id="view-home">
        <section class="hero">
          <div class="hero-text">
            <p class="hero-eyebrow">Your music, your server</p>
            <h1 class="hero-title">Stream<br/><em>Anything.</em></h1>
            <p class="hero-sub">All your songs, beautifully organized.</p>
          </div>
          <div class="hero-visual">
            <div class="vinyl" id="heroVinyl">
              <div class="vinyl-center"></div>
              <div class="vinyl-ring"></div>
              <div class="vinyl-ring vinyl-ring--2"></div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">
            <h2 class="section-title">All Songs</h2>
            <select class="sort-select" id="sortSelect">
              <option value="default">Default</option>
              <option value="title">Title A–Z</option>
              <option value="artist">Artist A–Z</option>
              <option value="duration">Duration</option>
            </select>
          </div>
          <div class="songs-grid" id="songsGrid">
            <div class="loading-state">
              <div class="spinner"></div>
              <p>Loading your library…</p>
            </div>
          </div>
        </section>
      </div>

      <!-- LIBRARY VIEW -->
      <div class="view hidden" id="view-library">
        <section class="section">
          <div class="section-header"><h2 class="section-title">Library</h2></div>
          <div class="songs-list" id="libraryList"></div>
        </section>
      </div>

      <!-- LIKED VIEW -->
      <div class="view hidden" id="view-liked">
        <section class="section">
          <div class="section-header"><h2 class="section-title">Liked Songs</h2></div>
          <div class="songs-list" id="likedList"></div>
        </section>
      </div>

    </div><!-- /.content -->
  </main>

  <!-- ── PLAYER BAR ─────────────────────────────────────────────────── -->
  <div class="player-bar" id="playerBar">
    <div class="player-track">
      <div class="player-art" id="playerArt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="player-info">
        <div class="player-title"  id="playerTitle">No song selected</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
      <button class="like-btn" id="likeBtn" aria-label="Like">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
      </button>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"/>
            <line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/>
            <line x1="4" y1="4" x2="9" y2="9"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="prevBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="19 20 9 12 19 4 19 20"/>
            <line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button class="ctrl-btn play-btn" id="playBtn">
          <svg class="icon-play"  viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 4 15 12 5 20 5 4"/>
            <line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" title="Repeat off">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="17 1 21 5 17 9"/>
            <path d="M3 11V9a4 4 0 014-4h14"/>
            <polyline points="7 23 3 19 7 15"/>
            <path d="M21 13v2a4 4 0 01-4 4H3"/>
          </svg>
        </button>
      </div>
      <div class="player-progress">
        <span class="time" id="timeElapsed">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill"  id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time" id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button class="ctrl-btn" id="muteBtn">
        <svg class="icon-vol"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
        <svg class="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
      </button>
      <div class="vol-bar" id="volBar">
        <div class="vol-fill"  id="volFill"></div>
        <div class="vol-thumb" id="volThumb"></div>
      </div>
      <button class="ctrl-btn" id="eqToggleBtn" title="Equalizer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 13 10 21 14 18 14 13 22 3"/></svg>
      </button>
      <button class="ctrl-btn expand-btn" id="expandBtn" title="Expand player">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
      </button>
    </div>
  </div>

  <!-- ── FULLSCREEN PLAYER ──────────────────────────────────────────── -->
  <div class="fs-player" id="fsPlayer">
    <div class="fs-bg" id="fsBg"></div>
    <div class="fs-overlay"></div>
    <canvas class="fs-canvas" id="fsCanvas"></canvas>

    <!-- Always-visible content layer: art + marquee -->
    <div class="fs-content">
      <div class="fs-art-wrap">
        <div class="fs-art" id="fsArt">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
      </div>
      <div class="fs-marquee">
        <div class="fs-marquee-text" id="fsMarqueeText"></div>
      </div>
    </div>

    <!-- Tap-to-reveal controls overlay -->
    <div class="fs-controls-overlay" id="fsControlsOverlay">
      <div class="fs-topbar">
        <button class="fs-back" id="fsBack">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Now Playing
        </button>
        <button class="fs-dots" id="fsMenuBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/>
            <circle cx="12" cy="5"  r="1"/>
            <circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
      </div>

      <div class="fs-bottom-controls">
        <div class="fs-seek">
          <div class="fs-prog-bar" id="fsProgressBar">
            <div class="fs-prog-fill"  id="fsProgressFill"></div>
            <div class="fs-prog-thumb" id="fsProgressThumb"></div>
          </div>
          <div class="fs-times">
            <span id="fsTimeElapsed">0:00</span>
            <span id="fsTimeDuration">0:00</span>
          </div>
        </div>

        <div class="fs-buttons-row">
          <div class="fs-left-buttons">
            <button class="fs-ctrl sm" id="fsShuffleBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            </button>
            <button class="fs-ctrl sm" id="fsRepeatBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
            </button>
          </div>
          <div class="fs-center-buttons">
            <button class="fs-ctrl" id="fsPrevBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
            </button>
            <button class="fs-ctrl main-play" id="fsPlayBtn">
              <svg class="icon-play"  viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="fs-ctrl" id="fsNextBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
            </button>
          </div>
          <div class="fs-right-buttons">
            <button class="fs-ctrl sm fs-like-btn" id="fsLikeBtnFullscreen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── EQUALIZER MODAL ────────────────────────────────────────────── -->
  <div class="eq-modal" id="eqModal">
    <div class="eq-panel" id="eqPanel">
      <div class="eq-header">
        <span class="eq-title">Equalizer</span>
        <label class="eq-toggle-switch" title="Enable / Disable Equalizer" aria-label="Equalizer on/off">
          <input type="checkbox" id="eqPowerToggle" checked/>
          <span class="eq-toggle-track">
            <span class="eq-toggle-thumb"></span>
          </span>
          <span class="eq-toggle-label" id="eqToggleLabel">On</span>
        </label>
      </div>
      <div class="eq-presets" id="eqPresets">
        <button class="eq-preset" data-preset="flat">Flat</button>
        <button class="eq-preset" data-preset="bass">Bass</button>
        <button class="eq-preset" data-preset="treble">Treble</button>
        <button class="eq-preset" data-preset="vocal">Vocal</button>
        <button class="eq-preset" data-preset="rock">Rock</button>
        <button class="eq-preset" data-preset="jazz">Jazz</button>
        <button class="eq-preset" data-preset="electronic">Electronic</button>
      </div>
      <div class="eq-sliders" id="eqSliders"></div>
    </div>
  </div>

  <!-- ── CARD TEMPLATES ─────────────────────────────────────────────── -->
  <template id="songListTemplate">
    <div class="list-item">
      <div class="list-num"></div>
      <div class="list-art">
        <img class="list-img" src="" alt="" loading="lazy" decoding="async"/>
        <div class="list-fallback">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <div class="list-play-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
      <div class="list-info">
        <div class="list-title"></div>
        <div class="list-artist"></div>
      </div>
      <div class="list-album"></div>
      <div class="list-genre"></div>
      <div class="list-duration"></div>
    </div>
  </template>

  <template id="songCardTemplate">
    <div class="song-card">
      <div class="card-art">
        <img class="card-img" src="" alt="" loading="lazy" decoding="async"/>
        <div class="card-img-fallback">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <div class="card-overlay">
          <button class="card-play-btn">
            <svg class="icon-play"  viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="card-expand-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
            </svg>
          </button>
        </div>
        <div class="card-num"></div>
        <div class="card-bars"><span></span><span></span><span></span><span></span></div>
      </div>
      <div class="card-info">
        <div class="card-title"></div>
        <div class="card-artist"></div>
        <div class="card-meta">
          <span class="card-genre"></span>
          <span class="card-duration"></span>
        </div>
      </div>
    </div>
  </template>

  <!-- Hidden audio element — preload=metadata fetches just enough to get duration -->
  <audio id="audioEl" preload="metadata"></audio>

  <!--
    Both scripts deferred — parsed after HTML, executed in document order.
    app.js runs first (exposes window.__sw_* bridge), then auth-init.js.
    Neither blocks the initial render.
  -->
  <script src="/static/app.js"       defer></script>
  <script src="/static/auth-init.js" defer></script>
</body>
</html>
